<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d5e3d"/>
      <stop offset="100%" stop-color="#042e1c"/>
    </linearGradient>
  </defs>

  <!-- Dark green rounded square badge -->
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>
  <!-- Subtle inner border -->
  <rect x="3" y="3" width="94" height="94" rx="17" fill="none" stroke="white" stroke-width="1" opacity="0.07"/>

  <!-- "JK" gold italic serif -->
  <text
    x="50" y="60"
    text-anchor="middle"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="42"
    font-style="italic"
    font-weight="700"
    fill="#C9A84C"
  >JK</text>

  <!-- Thin gold underline accent -->
  <line x1="22" y1="68" x2="78" y2="68" stroke="#C9A84C" stroke-width="1.2" opacity="0.55"/>

  <!-- "DuoFunds" small label -->
  <text
    x="50" y="82"
    text-anchor="middle"
    font-family="'Trebuchet MS', 'Gill Sans MT', 'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    textLength="54"
    lengthAdjust="spacing"
    fill="#C9A84C"
    opacity="0.8"
  >DuoFunds</text>
</svg>
