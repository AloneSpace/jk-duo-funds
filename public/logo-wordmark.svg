<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <defs>
    <linearGradient id="jkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Banknote / money icon -->
  <rect x="70" y="6" width="60" height="38" rx="5" stroke="#C9A84C" stroke-width="1.8"/>
  <!-- Inner lines representing bill value -->
  <line x1="82" y1="19" x2="118" y2="19" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <line x1="82" y1="25" x2="112" y2="25" stroke="#C9A84C" stroke-width="1" opacity="0.5"/>
  <!-- Small rectangle as coin/stamp inside note -->
  <rect x="87" y="13" width="26" height="18" rx="2" stroke="#C9A84C" stroke-width="1" opacity="0.35"/>

  <!-- "JK" large italic serif gradient -->
  <text
    x="100" y="90"
    text-anchor="middle"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-size="50"
    font-style="italic"
    font-weight="700"
    fill="url(#jkGrad)"
  >JK</text>

  <!-- Double hairline gold separator -->
  <line x1="35" y1="98" x2="165" y2="98" stroke="#C9A84C" stroke-width="0.7"/>
  <line x1="35" y1="101" x2="165" y2="101" stroke="#C9A84C" stroke-width="0.7"/>

  <!-- "DFunds" tracked to match separator width -->
  <text
    x="100" y="114"
    text-anchor="middle"
    font-family="'Trebuchet MS', 'Gill Sans MT', 'Helvetica Neue', Arial, sans-serif"
    font-size="11"
    textLength="108"
    lengthAdjust="spacing"
    fill="#C9A84C"
  >DFunds</text>
</svg>
